<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wordly Dictionary</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <h1>📖 Wordly Dictionary</h1>
  <p>Search for any word to see its definition!</p>

  <div class="search-box">
    <input type="text" id="wordInput" placeholder="Type a word here..." />
    <button onclick="searchWord()">Search</button>
  </div>

  <p id="errorMsg"></p>

  <div id="result"></div>

  <hr />

  <h2>⭐ Saved Words</h2>
  <div id="savedWords">
    <p id="emptyMsg">No saved words yet.</p>
  </div>

  <script src="app.js"></script>
</body>
</html>
